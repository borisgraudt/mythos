# Mythos 150M — fast iteration / ablations
#
# Parameter count (approx):
#   Embedding (tied): 32000 × 768    = 24.6M
#   Per block (n_kv=4):
#     Attention: ~1.77M
#     FFN (SwiGLU, hidden=2048): ~4.72M
#     Block total: ~6.5M
#   24 layers: 24 × 6.5M = 156M
#   Total: ~155M  ✓

model:
  vocab_size:  32000
  d_model:     768
  n_layers:    24
  n_heads:     12
  n_kv_heads:  4          # GQA
  d_ff:        3072
  max_seq_len: 2048
  dropout:     0.0
  norm_eps:    1.0e-5
  rope_theta:  10000.0

training:
  batch_size:              8
  gradient_accumulation:   4       # effective batch = 32
  seq_len:                 512
  learning_rate:           3.0e-4
  min_lr:                  3.0e-5
  warmup_steps:            1000
  max_steps:               50000
  weight_decay:            0.1
  grad_clip:               1.0
  bfloat16:                true
  gradient_checkpointing:  false
  log_every:               50
  eval_every:              500
  save_every:              1000
  checkpoint_dir:          checkpoints/150m
