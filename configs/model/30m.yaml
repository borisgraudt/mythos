model:
  vocab_size: 32000
  d_model: 384
  n_layers: 8
  n_heads: 8
  n_kv_heads: 4
  d_ff: 1536
  max_seq_len: 512
  dropout: 0.0
  norm_eps: 1.0e-5
  rope_theta: 10000.0

training:
  batch_size: 8
  gradient_accumulation: 4
  seq_len: 512
  learning_rate: 5.0e-4
  min_lr: 5.0e-5
  warmup_steps: 750
  max_steps: 36600
  weight_decay: 0.1
  grad_clip: 1.0
  bfloat16: true
  log_every: 100
  eval_every: 1000
  save_every: 2000
  checkpoint_dir: checkpoints/scaling_30m
