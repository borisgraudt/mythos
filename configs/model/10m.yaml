model:
  vocab_size: 32000
  d_model: 256
  n_layers: 6
  n_heads: 8
  n_kv_heads: 4
  d_ff: 1024
  max_seq_len: 512
  dropout: 0.0
  norm_eps: 1.0e-5
  rope_theta: 10000.0

training:
  batch_size: 16
  gradient_accumulation: 2
  seq_len: 512
  learning_rate: 6.0e-4
  min_lr: 6.0e-5
  warmup_steps: 500
  max_steps: 12200
  weight_decay: 0.1
  grad_clip: 1.0
  bfloat16: true
  log_every: 50
  eval_every: 500
  save_every: 1000
  checkpoint_dir: checkpoints/scaling_10m
