model:
  vocab_size: 32000
  d_model: 1024
  n_layers: 40
  n_heads: 16
  n_kv_heads: 8
  d_ff: 4096
  max_seq_len: 2048
  dropout: 0.0
  norm_eps: 1.0e-5
  rope_theta: 10000.0

training:
  batch_size: 4
  gradient_accumulation: 8
  seq_len: 512
  learning_rate: 2.0e-4
  min_lr: 2.0e-5
  warmup_steps: 2000
  max_steps: 100000
  weight_decay: 0.1
  grad_clip: 1.0
  bfloat16: true
  log_every: 100
  eval_every: 2000
  save_every: 2000
  checkpoint_dir: checkpoints/base_500m
