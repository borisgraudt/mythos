# Mythos base — ~500M parameters
#
# Parameter count breakdown (approximate):
#   Embedding (tied w/ output): 32000 × 1024       =  32.8M
#   Per TransformerBlock:
#     Attention (GQA n_kv=8):
#       wq  1024 × 1024  = 1.05M
#       wk  1024 ×  512  = 0.52M  (8 KV heads × 64 head_dim)
#       wv  1024 ×  512  = 0.52M
#       wo  1024 × 1024  = 1.05M
#       subtotal          = 3.15M
#     FFN (SwiGLU, hidden=2816):
#       w1  1024 × 2816  = 2.88M
#       w2  2816 × 1024  = 2.88M
#       w3  1024 × 2816  = 2.88M
#       subtotal          = 8.65M
#     Norms (×2):         ≈ 0.004M
#     Block total:        ≈ 11.8M
#   40 layers:            40 × 11.8M = 472M
#   Final norm:           ≈ 0.001M
#   ─────────────────────────────────
#   Total (non-embedding): ~472M
#   Total (incl. shared embed): ~505M  ✓

model:
  vocab_size:  32000
  d_model:     1024
  n_layers:    40
  n_heads:     16
  n_kv_heads:  8          # GQA: 2× fewer KV heads → smaller KV cache
  d_ff:        4096
  max_seq_len: 2048
  dropout:     0.0        # 0 during pretraining; set 0.1 for fine-tuning
  norm_eps:    1.0e-5
  rope_theta:  10000.0

training:
  # ── Hardware (MacBook Air M2/M3 16GB) ───────────────────────────────
  # Full 500M in fp32 needs ~2GB params + ~2GB grads + ~4GB Adam moments
  # = ~8GB. With activations and batch this is tight on 8GB but fits on 16GB.
  #
  # Recommendations:
  #   - Use bfloat16 (torch.autocast) to halve memory
  #   - gradient_checkpointing=true to trade compute for memory
  #   - batch_size=2–4, seq_len=512 for local runs
  #   - For full pretraining scale, you'll want A100/H100 cluster
  batch_size:              4
  gradient_accumulation:   8       # effective batch = 32
  seq_len:                 512     # use 2048 on GPU
  learning_rate:           3.0e-4
  min_lr:                  3.0e-5  # cosine decay floor (10% of peak)
  warmup_steps:            2000
  max_steps:               100000
  weight_decay:            0.1
  grad_clip:               1.0
  bfloat16:                true
  gradient_checkpointing:  true
  log_every:               50
  eval_every:              500
  save_every:              1000
  checkpoint_dir:          checkpoints/base_500m
