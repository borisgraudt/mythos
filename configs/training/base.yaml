# Base training config — standard pretraining run
# Use with: configs/model/base_500m.yaml

training:
  batch_size:              4
  gradient_accumulation:   8       # effective batch = 32
  seq_len:                 512
  learning_rate:           3.0e-4
  min_lr:                  3.0e-5
  warmup_steps:            2000
  max_steps:               100000
  weight_decay:            0.1
  grad_clip:               1.0
  bfloat16:                true
  gradient_checkpointing:  true
  log_every:               50
  eval_every:              500
  save_every:              1000
  checkpoint_dir:          checkpoints/base
