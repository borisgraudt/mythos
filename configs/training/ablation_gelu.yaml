# Ablation: GeLU activation (baseline) vs SwiGLU (default)
# To switch: edit src/mythos/core/mlp.py FeedForward.act → nn.GELU()
# Compare against 150m.yaml which uses SwiGLU

model:
  vocab_size:  32000
  d_model:     768
  n_layers:    24
  n_heads:     12
  n_kv_heads:  4
  d_ff:        3072
  max_seq_len: 2048
  dropout:     0.0
  norm_eps:    1.0e-5
  rope_theta:  10000.0

training:
  batch_size:              8
  gradient_accumulation:   4
  seq_len:                 512
  learning_rate:           3.0e-4
  min_lr:                  3.0e-5
  warmup_steps:            1000
  max_steps:               10000
  weight_decay:            0.1
  grad_clip:               1.0
  bfloat16:                true
  gradient_checkpointing:  false
  log_every:               50
  eval_every:              500
  save_every:              2000
  checkpoint_dir:          checkpoints/ablation_gelu
